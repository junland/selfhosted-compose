config_version: 2
name: haproxy
mode: single
status: ""
dataplaneapi:
  advertised:
    api_address: ""
    api_port: 0
  scheme:
  - http
  user:
  - name: admin
    insecure: true # The API is bound to the loopback interface.
    password: '"${SELFHOSTED_HAPROXY_DATAPLANE_API_PASSWORD}"'
haproxy:
  reload:
    reload_strategy: custom
