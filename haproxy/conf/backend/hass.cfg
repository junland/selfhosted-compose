backend home
    balance roundrobin
    mode http
    option forwardfor

    timeout tunnel 3600s

    http-request add-header X-Forwarded-Proto https if { ssl_fc }
    http-request set-header X-Forwarded-Host %[req.hdr(Host)]

    server s1 hass:8123 check resolvers container_dns resolve-prefer ipv4 inter 3s rise 3 fall 3
